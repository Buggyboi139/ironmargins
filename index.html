<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Study Arena</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="left-color-bar"></div>

    <nav>
        <div class="logo-container">
            <span class="logo-text">Study Arena</span>
        </div>
        <div class="nav-actions">
            <button id="theme-toggle" class="nav-link neutral">Toggle Theme</button>
        </div>
    </nav>

    <main class="container">
        <section id="config-section" class="control-panel active-view">
            <h1>Configuration</h1>
            <p class="subtitle">Set up your study environment</p>
            
            <div class="calc-row">
                <div class="input-group">
                    <label for="exam-select">Select Exam</label>
                    <select id="exam-select" class="glass-input">
                        <option value="cysa">CySA+</option>
                        <option value="secplus">Security+</option>
                        <option value="casp">CASP+</option>
                    </select>
                </div>
            </div>

            <div class="calc-row">
                <div class="input-group">
                    <label for="api-key">OpenRouter API Key (BYOK)</label>
                    <div style="display: flex; gap: 10px; width: 100%;">
                        <input type="password" id="api-key" class="glass-input" placeholder="sk-or-v1-...">
                        <button id="save-key-btn" class="secondary-btn">Save</button>
                    </div>
                </div>
            </div>

            <button id="start-btn" class="primary-btn">Start Study Mode</button>
        </section>

        <section id="quiz-section" class="control-panel hidden-view">
            <div class="category-selector">
                <span class="category-title-label">Question <span id="current-q-num">1</span> of <span id="total-q-num"></span></span>
            </div>
            
            <h2 id="question-text" style="margin-bottom: 25px; font-size: 1.4rem; line-height: 1.5;"></h2>
            
            <div id="options-container"></div>
            
            <div class="controls" style="display: flex; justify-content: space-between; margin-top: 30px;">
                <button id="prev-btn" class="secondary-btn" disabled>Previous</button>
                <button id="next-btn" class="secondary-btn">Next</button>
            </div>

            <div id="feedback-card" class="hidden-view" style="margin-top: 30px;">
                <h3 id="feedback-verdict" style="font-size: 1.5rem; margin-bottom: 10px;"></h3>
                <p id="feedback-definition" style="color: var(--text-muted); line-height: 1.6; margin-bottom: 20px;"></p>
                <button id="ai-tutor-btn" class="secondary-btn" style="width: 100%;">Explain with AI Tutor</button>
                
                <div id="ai-response-container" class="hidden-view" style="margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid var(--border-glass);">
                    <p id="ai-response-text" style="color: #38bdf8; line-height: 1.5;"></p>
                </div>
            </div>
        </section>
    </main>

    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
